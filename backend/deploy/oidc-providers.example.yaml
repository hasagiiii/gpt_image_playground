# OIDC 提供商配置模板
#
# 放在 oidc.providers 数组中。后端启动时会调用每个 issuer_url + "/.well-known/openid-configuration"
# 完成 OIDC discovery，因此只需要标准 OIDC 提供商即可，无需为每家做适配。
#
# 必填字段：name / issuer_url / client_id / client_secret / redirect_uri
# 可选字段：display_name / scopes（默认 openid profile email）

# ----- 通用 OIDC（推荐）-----
- name: corp-sso
  display_name: 企业单点登录
  issuer_url: https://your-oidc-provider.example.com
  client_id: your-client-id
  client_secret: your-client-secret
  redirect_uri: https://app.example.com/auth/callback/corp-sso
  scopes:
    - openid
    - profile
    - email

# ----- Auth0 示例 -----
# - name: auth0
#   display_name: Auth0
