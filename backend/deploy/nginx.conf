# 全栈部署的 nginx 同源反代示例：
#   前端静态文件 + 后端 OIDC 服务 + 用户图像 API 代理
# 与 deploy/nginx.conf（仅前端）相对应，部署后端时使用此配置。
#
# 必要环境变量：
#   $HOST / $PORT            监听地址，默认 0.0.0.0:80
#   $BACKEND_UPSTREAM        后端地址，例如 http://backend:8080
#   $API_PROXY_URL           （可选）用户图像 API 代理目标
#
# 前端在 build 时设置 VITE_AUTH_BACKEND_URL="" 即可使用同源调用 /auth /api/v1。

server {
    listen ${HOST}:${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 600m;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # 静态资源长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 后端 OIDC + JWT 认证
    location /auth/ {
        proxy_pass ${BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 后端业务 API（受认证中间件保护）
    location /api/v1/ {
        proxy_pass ${BACKEND_UPSTREAM};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
    }

    # 后端健康检查
    location = /health {
        proxy_pass ${BACKEND_UPSTREAM};
        access_log off;
    }
    location = /health/ready {
        proxy_pass ${BACKEND_UPSTREAM};
        access_log off;
    }

    # 用户图像 API 代理（可选，与现有 deploy/nginx.conf 相同）
    location /api-proxy/ {
        limit_except POST OPTIONS {
            deny all;
        }

        if ($uri = "/api-proxy/") {
            return 403 "Forbidden: API Proxy path required";
        }

        proxy_pass ${API_PROXY_URL}/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
